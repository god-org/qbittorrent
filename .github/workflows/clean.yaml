name: Clean

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      f_deep:
        description: 彻底清理
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 检查状态
        id: stat
        env:
          GH_TOKEN: ${{ secrets.CLEAN_TOKEN }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          [[ $OWNER_TYPE == Organization ]] && api_base=orgs || api_base=users

          run_cnt=$(gh run list -L 2 --json databaseId -q length || echo 0)
          rel_cnt=$(gh release list -L 1 --json tagName -q length || echo 0)
          pkg_raw=$(gh api \
            "/$api_base/$REPO_OWNER/packages?package_type=container" \
            --paginate \
            -q '.[] | select(.repository.name == env.REPO_NAME) | .name' |
            sort -f || :)

          pkg_cnt=0 pkg_list=
          [[ -n $pkg_raw ]] &&
            mapfile -t pkg_arr <<<"$pkg_raw" &&
            pkg_cnt=${#pkg_arr[@]} &&
            pkg_list=${pkg_raw//$'\n'/,}

          printf '%s\n' "api_base=$api_base" "run_cnt=$run_cnt" \
            "rel_cnt=$rel_cnt" "pkg_cnt=$pkg_cnt" \
            "pkg_list=$pkg_list" >>"$GITHUB_OUTPUT"

      - name: 清理 Actions 运行记录
        if: steps.stat.outputs.run_cnt > 1
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: ${{ inputs.f_deep && -1 || 30 }}
          keep_minimum_runs: ${{ inputs.f_deep && -1 || 6 }}

      - name: 清理 GitHub 发布版本
        if: steps.stat.outputs.rel_cnt > 0
        uses: sgpublic/delete-release-action@v1.2
        with:
          release-drop: true
          release-keep-count: ${{ inputs.f_deep && -1 || 10 }}
          pre-release-drop: ${{ inputs.f_deep && true || false }}
          pre-release-keep-count: -1
          draft-drop: ${{ inputs.f_deep && true || false }}
          draft-drop-count: -1

      - name: 清理 GHCR 容器镜像
        if: steps.stat.outputs.pkg_cnt > 0
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: ${{ steps.stat.outputs.pkg_list }}
          keep-n-untagged: 0
          keep-n-tagged: ${{ inputs.f_deep && 1 || 10 }}

      - name: 删除 Actions 缓存
        if: inputs.f_deep
        run: |
          gh cache delete -a --succeed-on-no-caches

      - name: 删除 GHCR 容器镜像
        if: inputs.f_deep && steps.stat.outputs.pkg_cnt > 0
        env:
          GH_TOKEN: ${{ secrets.CLEAN_TOKEN }}
          pkg_list: ${{ steps.stat.outputs.pkg_list }}
          API_BASE: ${{ steps.stat.outputs.api_base }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          mapfile -t pkgs <<<"${pkg_list//,/$'\n'}"
          for pkg in "${pkgs[@]}"; do
            gh api -X DELETE "/$API_BASE/$REPO_OWNER/packages/container/$pkg"
          done
