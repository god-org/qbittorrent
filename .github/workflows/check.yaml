name: Check

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euxo pipefail {0}
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v6

      - name: 获取远程最新提交哈希
        id: getHash
        env:
          REPO_PATH: qbittorrent/qBittorrent
          REPO_BRANCH: v4_1_x
        run: |
          commit_hash=$(gh api "/repos/${REPO_PATH}/commits/${REPO_BRANCH}" -q '.sha')
          echo "commitHash=${commit_hash}" >>"${GITHUB_OUTPUT}"

      - name: 对比提交哈希（缓存校验）
        id: cacheHash
        uses: actions/cache@v5
        with:
          path: .commitHash
          key: commitHash_${{ steps.getHash.outputs.commitHash }}

      - name: 保存新的提交哈希到文件
        if: steps.cacheHash.outputs.cache-hit != 'true'
        env:
          COMMIT_HASH: ${{ steps.getHash.outputs.commitHash }}
        run: |
          echo "${COMMIT_HASH}" >.commitHash

      - name: 触发构建工作流
        if: steps.cacheHash.outputs.cache-hit != 'true'
        run: |
          gh workflow run Build
